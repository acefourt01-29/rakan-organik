<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakan Organik Club — Project FTR Jersey &amp; Aktiviti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080808;
    --bg-deep:#000000;
    --ink:#f2f2ee;
    --paper:#eeece6;
    --paper-deep:#e3e0d7;
    --gray:#9a9a92;
    --gray-dark:#4a4a45;
    --line-on-dark: rgba(242,242,238,0.16);
    --line-on-light: rgba(8,8,8,0.14);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    font-weight:400;
    line-height:1.6;
    overflow-x:hidden;
  }
  h1,h2,h3{
    font-family:'Anton', sans-serif;
    font-weight:400;
    letter-spacing:0.01em;
    text-transform:uppercase;
  }
  .mono{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.08em;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  button{font-family:inherit;cursor:pointer;}
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--ink);
    outline-offset:3px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  .wrap{max-width:1180px; margin:0 auto; padding:0 32px;}

  /* ================= NAV ================= */
  header.site{
    position:fixed; top:0; left:0; right:0; z-index:60;
    background:rgba(8,8,8,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-on-dark);
  }
  .nav-inner{
    max-width:1180px; margin:0 auto; padding:16px 32px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand-mark{display:flex; align-items:center; gap:12px;}
  .brand-mark img{width:38px; height:38px;}
  .brand-mark span{font-family:'Anton'; font-size:1rem; letter-spacing:0.03em;}
  nav.links{display:flex; gap:34px;}
  nav.links a{font-size:0.82rem; letter-spacing:0.04em; text-transform:uppercase; position:relative; padding:4px 0;}
  nav.links a::after{content:""; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--ink); transition:width 0.3s ease;}
  nav.links a:hover::after{width:100%;}
  .nav-cta{
    font-family:'IBM Plex Mono'; font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase;
    border:1px solid var(--ink); padding:9px 18px; border-radius:2px;
    transition:background 0.25s ease, color 0.25s ease;
  }
  .nav-cta:hover{background:var(--ink); color:var(--bg);}
  .menu-toggle{display:none; background:none; border:none; color:var(--ink); font-size:1.5rem;}

  .mobile-nav{
    display:none; position:fixed; inset:0; z-index:70; background:var(--bg-deep);
    flex-direction:column; padding:100px 32px 40px; gap:28px;
  }
  .mobile-nav.open{display:flex;}
  .mobile-nav a{font-family:'Anton'; font-size:1.6rem; text-transform:uppercase;}
  .mobile-nav .close-btn{position:absolute; top:22px; right:28px; background:none; border:none; color:var(--ink); font-size:1.8rem;}

  /* ================= HERO ================= */
  .hero{padding:150px 0 90px; position:relative;}
  .hero-grid{display:flex; flex-direction:column; align-items:center; text-align:center; max-width:820px; margin:0 auto;}
  .eyebrow{
    display:inline-flex; align-items:center; justify-content:center;
    margin:0 auto 28px; padding:9px 18px;
    border:1px solid var(--line-on-dark); border-radius:999px;
  }
  .eyebrow span{font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--gray);}
  h1.headline{
    font-size:clamp(2.4rem, 5.4vw, 4.2rem);
    line-height:1.08;
    max-width:16ch;
    text-wrap:balance;
    opacity:0; animation:riseIn 0.9s cubic-bezier(0.2,0.7,0.3,1) 0.15s forwards;
  }
  @keyframes riseIn{from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);}}
  .hero-sub{max-width:44ch; margin:24px auto 0; font-size:1rem; color:var(--gray);}
  .hero-actions{display:flex; gap:16px; margin-top:36px; flex-wrap:wrap; justify-content:center;}
  .btn-primary{
    background:var(--ink); color:var(--bg); padding:15px 26px; border-radius:2px;
    font-size:0.85rem; letter-spacing:0.02em; text-transform:uppercase; font-weight:600;
    transition:transform 0.25s ease, background 0.25s ease; display:inline-block;
  }
  .btn-primary:hover{background:var(--paper); transform:translateY(-2px);}
  .btn-secondary{
    border:1px solid var(--ink); color:var(--ink); background:transparent;
    padding:15px 26px; border-radius:2px;
    font-size:0.85rem; letter-spacing:0.02em; text-transform:uppercase; font-weight:600;
    transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease; display:inline-block;
  }
  .btn-secondary:hover{background:var(--ink); color:var(--bg); transform:translateY(-2px);}
  .hero-visual{
    border:1px solid var(--line-on-dark); border-radius:4px; overflow:hidden;
    opacity:0; animation:riseIn 0.9s cubic-bezier(0.2,0.7,0.3,1) 0.35s forwards;
    background:#000;
  }
  .hero-visual img{width:100%; height:auto;}

  /* ================= STATUS STRIP ================= */
  .strip{border-top:1px solid var(--line-on-dark); border-bottom:1px solid var(--line-on-dark); padding:16px 0; overflow:hidden; white-space:nowrap;}
  .strip-track{display:inline-flex; gap:44px; animation:scroll 26s linear infinite;}
  .strip-track span{font-size:0.74rem; color:var(--gray); text-transform:uppercase;}
  @keyframes scroll{from{transform:translateX(0);} to{transform:translateX(-50%);}}

  /* ================= SECTION HEAD ================= */
  .section-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:52px; gap:24px; flex-wrap:wrap;}
  .section-head h2{font-size:clamp(1.9rem, 3.2vw, 2.6rem);}
  .section-head p{max-width:38ch; color:var(--gray); font-size:0.92rem;}
  .light .section-head p{color:var(--gray-dark);}

  /* ================= MERCH ================= */
  .merch{padding:110px 0;}
  .merch-top{display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--line-on-dark); border:1px solid var(--line-on-dark); margin-bottom:56px;}
  .merch-shot{background:#000; position:relative;}
  .merch-shot img{width:100%; height:100%; object-fit:cover;}
  .merch-shot .cap{position:absolute; bottom:14px; left:14px; font-size:0.68rem; color:var(--gray); background:rgba(0,0,0,0.55); padding:5px 10px; border-radius:2px;}

  .merch-info{display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--line-on-dark); border:1px solid var(--line-on-dark);}
  .info-card{background:var(--bg); padding:32px 28px;}
  .info-card .tag{color:var(--gray); font-size:0.68rem; display:block; margin-bottom:14px;}
  .info-card h3{font-size:1.05rem; margin-bottom:10px; letter-spacing:0.02em;}
  .info-card p, .info-card li{font-size:0.88rem; color:var(--gray); }
  .info-card ul{list-style:none; display:flex; flex-direction:column; gap:6px;}
  .price-row{display:flex; justify-content:space-between; font-size:0.88rem; padding:6px 0; border-bottom:1px dashed var(--line-on-dark);}
  .price-row:last-child{border-bottom:none;}
  .price-row .amt{font-family:'IBM Plex Mono';}

  /* size chart */
  .size-chart{overflow-x:auto; border:1px solid var(--line-on-dark); border-radius:4px;}
  table.sizes{border-collapse:collapse; width:100%; min-width:640px;}
  table.sizes th, table.sizes td{
    padding:14px 18px; text-align:center; font-size:0.85rem; border-bottom:1px solid var(--line-on-dark);
  }
  table.sizes th{
    font-family:'IBM Plex Mono'; text-transform:uppercase; font-size:0.7..0rem; color:var(--gray); font-weight:500;
    border-bottom:1px solid var(--line-on-dark);
  }
  table.sizes td:first-child, table.sizes th:first-child{
    font-family:'Anton'; text-align:left; padding-left:22px;
  }
  table.sizes tr:last-child td{border-bottom:none;}
  table.sizes tr:hover td{background:rgba(242,242,238,0.03);}

  /* ================= ORDER (light panel) ================= */
  .light{background:var(--paper); color:#141310;}
  .light .gray-text{color:#5c5a52;}
  .order{padding:110px 0;}
  .order-grid{display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--line-on-light); border:1px solid var(--line-on-light);}
  .order-panel{background:var(--paper); padding:38px 34px;}
  .order-panel h3{font-size:1.2rem; margin-bottom:20px;}
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; color:#5c5a52; margin-bottom:7px; font-family:'IBM Plex Mono';}
  .field input, .field select, .field textarea{
    width:100%; padding:12px 14px; border:1px solid rgba(20,19,16,0.28); border-radius:2px;
    background:var(--paper); color:#141310; font-family:'Work Sans'; font-size:0.92rem;
  }
  .field textarea{resize:vertical; min-height:70px;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .submit-btn{
    width:100%; background:#141310; color:var(--paper); padding:15px 20px; border:none; border-radius:2px;
    font-size:0.86rem; text-transform:uppercase; letter-spacing:0.04em; font-weight:600; margin-top:8px;
    transition:background 0.25s ease;
  }
  .submit-btn:hover{background:#3a3830;}
  .bank-box{background:rgba(20,19,16,0.05); border:1px solid rgba(20,19,16,0.16); border-radius:4px; padding:20px 22px; margin-top:22px;}
  .bank-box .mono{font-size:0.86rem; display:block; margin-bottom:4px;}
  .qr-box{margin-top:18px; display:flex; flex-direction:column; align-items:flex-start; gap:12px;}
  .qr-box .qr-label{font-size:0.74rem; color:#5c5a52;}
  .qr-img{width:180px; height:auto; border:1px solid rgba(20,19,16,0.16); border-radius:6px;}
  .edit-flag{
    display:inline-block; font-family:'IBM Plex Mono'; font-size:0.66rem; letter-spacing:0.05em;
    background:#141310; color:var(--paper); padding:2px 7px; border-radius:2px; margin-left:8px; vertical-align:middle;
  }
  .note{font-size:0.8rem; color:#5c5a52; margin-top:16px;}

  /* ================= ACTIVITIES ================= */
  .activities{padding:110px 0;}
  .trip-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px; background:var(--line-on-dark); border:1px solid var(--line-on-dark);}
  .trip-card{background:var(--bg); padding:30px 28px 26px;}
  .trip-card .tag{color:var(--gray); font-size:0.68rem; display:block; margin-bottom:10px;}
  .trip-card h3{font-size:1.3rem; margin-bottom:16px;}
  .hud{
    border:1px solid var(--line-on-dark); border-radius:3px; padding:14px 16px; display:flex; gap:24px; margin-bottom:18px; flex-wrap:wrap;
  }
  .hud .cell{display:flex; flex-direction:column; gap:4px;}
  .hud .cell .k{font-size:0.62rem; color:var(--gray); text-transform:uppercase; font-family:'IBM Plex Mono';}
  .hud .cell .v{font-size:0.86rem; font-family:'IBM Plex Mono';}
  .trip-card p.desc{font-size:0.88rem; color:var(--gray); margin-bottom:16px;}
  .trip-follow{
    background:var(--bg-deep); padding:34px 28px; display:flex; flex-direction:column; justify-content:center; gap:10px;
  }
  .trip-follow h3{font-size:1.1rem;}
  .trip-follow p{font-size:0.86rem; color:var(--gray);}

  /* ================= CTA ================= */
  .cta{background:var(--bg-deep); padding:120px 0; text-align:center;}
  .cta h2{font-size:clamp(2rem, 5vw, 3.4rem); max-width:16ch; margin:0 auto 24px; line-height:1.05;}
  .cta p{color:var(--gray); max-width:44ch; margin:0 auto 36px; font-size:0.98rem;}

  /* ================= FOOTER ================= */
  footer{background:var(--bg-deep); color:var(--gray); padding:40px 0; border-top:1px solid var(--line-on-dark);}
  .footer-inner{display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px; font-size:0.8rem; align-items:center;}
  .footer-inner .brand-mark img{width:28px; height:28px;}
  .social-links{display:flex; gap:18px;}
  .social-links a{color:var(--gray); display:flex; transition:color 0.2s ease;}
  .social-links a:hover{color:var(--ink);}

  /* ================= RESPONSIVE ================= */
  @media (max-width:860px){
    nav.links{display:none;}
    .menu-toggle{display:block;}
    .hero-actions{flex-direction:column; width:100%; max-width:340px; margin-left:auto; margin-right:auto;}
    .hero-actions .btn-primary, .hero-actions .btn-secondary{width:100%; text-align:center;}
    .merch-top{grid-template-columns:1fr;}
    .merch-info{grid-template-columns:1fr;}
    .order-grid{grid-template-columns:1fr;}
    .field-row{grid-template-columns:1fr;}
    .trip-grid{grid-template-columns:1fr;}
    .hero{padding:130px 0 60px;}
  }
</style>
</head>
